<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Gestor - Conferência</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .painel-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
            width: 100%;
        }
        .painel-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        /* ESTILO DA BARRA DE BUSCA E BOTÕES */
        .search-bar {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
            gap: 10px;
            flex-wrap: wrap; /* Permite que os botões desçam no celular */
        }
        .search-bar input {
            max-width: 300px;
            margin-bottom: 0;
            background: #fff;
        }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .gestor-card {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            border-left: 6px solid #f1c40f; 
            display: flex;
            flex-direction: column;
        }
        .gestor-card.aprovado {
            border-left-color: #2ecc71; 
            opacity: 0.85;
        }
        .gestor-card.rejeitado {
            border-left-color: #e74c3c; 
            opacity: 0.7;
        }
        .gestor-card p {
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        .codigo-destaque {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--card-bg);
            background: var(--text-color);
            padding: 8px 10px;
            border-radius: 4px;
            text-align: center;
            margin: 15px 0;
            letter-spacing: 3px;
        }
        .acoes-gestor {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: auto;
        }
        .btn-aprovar { background-color: #2ecc71; color: white; border: none; flex: 1; }
        .btn-rejeitar { background-color: #e74c3c; color: white; border: none; flex: 1; }
        .btn-excluir { background-color: #555; color: white; border: none; flex: 1; }
        
        .btn-aprovar:hover { background-color: #27ae60; }
        .btn-rejeitar:hover { background-color: #c0392b; }
        .btn-excluir:hover { background-color: #222; }
    </style>
</head>
<body>

    <!-- MODAL DE SENHA CUSTOMIZADO -->
    <div id="modal-senha" class="modal-overlay active">
        <div class="modal-content">
            <div class="modal-icon">
                <i class="fa-solid fa-lock"></i>
            </div>
            <h3 style="margin-bottom: 15px; color: var(--text-color);">Acesso Restrito</h3>
            <p style="margin-bottom: 15px; font-size: 0.95rem; color: #444;">Digite a senha do gestor para acessar o painel:</p>
            
            <input type="password" id="input-senha" placeholder="Sua senha..." style="text-align: center; font-size: 1.2rem; letter-spacing: 3px; margin-bottom: 10px;">
            <p id="erro-senha" style="color: #e74c3c; font-size: 0.85rem; display: none; margin-bottom: 15px;">Senha incorreta! Tente novamente.</p>
            
            <button type="button" class="btn-action" onclick="verificarSenha()" style="width: 100%;">Acessar Painel</button>
            <button type="button" class="btn-alt" onclick="window.location.href='index.html'" style="width: 100%; margin-top: 10px;">Voltar ao Site</button>
        </div>
    </div>

    <div class="painel-container">
        
        <button type="button" class="btn-alt" onclick="window.location.href='index.html'" style="margin-bottom: 20px; width: auto; padding: 10px 20px; display: inline-flex; align-items: center; gap: 8px;">
            <i class="fa-solid fa-arrow-left"></i> Voltar ao Site
        </button>

        <div class="painel-header">
            <h1>Painel de Gestão de Pagamentos</h1>
            <p class="subtitle">CONFERÊNCIA DE MULHERES</p>
        </div>

        <div class="search-bar">
            <input type="text" id="input-busca" placeholder="Buscar por Código ou CPF">
            <button type="button" class="btn-action" style="width: auto; padding: 0 20px;" onclick="limparBusca()">Limpar</button>
            
            <!-- NOVO BOTÃO DE GERAR PDF -->
            <button type="button" class="btn-action" style="width: auto; padding: 0 20px; background-color: #900C3F;" onclick="gerarPDF()">
                <i class="fa-solid fa-file-pdf"></i> Gerar PDF
            </button>
        </div>

        <div class="grid-cards" id="container-cards">
            <!-- Cards injetados via JS -->
        </div>
    </div>

    <!-- Conectando ao Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <!-- Bibliotecas para gerar o PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <script src="painel.js"></script>
</body>
</html>
